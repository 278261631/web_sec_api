# 服务端配置文件

# 监控的图像列表（支持任意数量）
images:
  - name: "test"
    path: "D:/github/test_img/test.png"
  - name: "AAG_ImageCloudCondition"
    path: "D:/github/test_img/AAG_ImageCloudCondition.png"
  - name: "AAG_ImageDayCondition"
    path: "D:/github/test_img/AAG_ImageDayCondition.png"
  - name: "test-c"
    path: "D:/github/test_img/test-c.jpg"
  - name: "test-d"
    path: "D:/github/test_img/test-d.jpg"
  - name: "test-e"
    path: "D:/github/test_img/test-e.png"

# 服务器监听设置
host: "0.0.0.0"
port: 28010

# 后台检测图像变化的间隔（秒）
check_interval: 5.0

# 客户端活跃超时（秒），超过此时间未活动视为离线，其他客户端可接管该 Key
session_timeout: 30.0

# 允许的 API Key 列表
api_keys:
  - "key-abc123456"
  - "key-xyz789012"
